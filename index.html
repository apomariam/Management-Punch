<!doctype html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punch Management Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Test Koneksi Supabase</h1>
        
        <!-- Status Koneksi -->
        <div id="status" class="mb-4 p-4 bg-yellow-100 rounded-lg">
            Mengecek koneksi...
        </div>

        <!-- Hasil Query -->
        <div id="result" class="bg-white rounded-lg shadow p-4">
            <pre id="data" class="whitespace-pre-wrap">Menunggu data...</pre>
        </div>
    </div>

    <script>
        // KONFIGURASI SUPABASE
        const SUPABASE_URL = 'https://qtvmljmmyfhjixzvqlfl.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF0dm1sam1teWZoaml4enZxbGZsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0MjAyMTEsImV4cCI6MjA4Njk5NjIxMX0.vKp0vl6n9iEVZOCxyCUPqdzOiZLCBvxTyXazDQRUMjg';

        // Inisialisasi Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Fungsi untuk update status
        function updateStatus(message, isError = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = `mb-4 p-4 rounded-lg ${isError ? 'bg-red-100 text-red-700' : 'bg-green-100 text-green-700'}`;
            statusDiv.textContent = message;
        }

        // TEST KONEKSI SEDERHANA
        async function testConnection() {
            try {
                updateStatus('Mencoba koneksi ke Supabase...');
                
                // Test 1: Cek koneksi dasar
                console.log('Test 1: Cek kesehatan koneksi');
                
                // Test 2: Coba query sederhana
                console.log('Test 2: Coba query ke tabel drawers');
                const { data, error, count } = await supabase
                    .from('drawers')
                    .select('*', { count: 'exact', head: true });

                if (error) {
                    console.error('Error detail:', error);
                    updateStatus(`Error: ${error.message} - ${error.details || ''}`, true);
                    document.getElementById('data').textContent = JSON.stringify(error, null, 2);
                    return;
                }

                updateStatus(`SUKSES! Terhubung ke Supabase. Total data: ${count || 0} records`);
                
                // Test 3: Ambil sample data
                const { data: sampleData, error: sampleError } = await supabase
                    .from('drawers')
                    .select('*')
                    .limit(5);

                if (sampleError) {
                    document.getElementById('data').textContent = JSON.stringify(sampleError, null, 2);
                } else {
                    document.getElementById('data').textContent = JSON.stringify(sampleData, null, 2);
                }

            } catch (err) {
                console.error('Exception:', err);
                updateStatus(`Exception: ${err.message}`, true);
                document.getElementById('data').textContent = err.stack || err.message;
            }
        }

        // Jalankan test
        testConnection();
    </script>
</body>
</html>
